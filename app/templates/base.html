<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Email Hoover{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f1e8;
            --panel: #fffaf2;
            --ink: #1f2933;
            --muted: #52606d;
            --accent: #a23e2a;
            --line: #d9cbb8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background: linear-gradient(180deg, #efe3d2 0%, var(--bg) 28%, #f9f6ef 100%);
            color: var(--ink);
        }

        a, button {
            color: inherit;
        }

        .shell {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1rem 3rem;
        }

        .hero,
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 12px 32px rgba(31, 41, 51, 0.08);
        }

        .hero {
            display: grid;
            gap: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .hero h1,
        .panel h2 {
            margin: 0;
        }

        .hero p,
        .muted {
            color: var(--muted);
        }

        .banner {
            margin-bottom: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 12px;
        }

        .banner-error {
            border: 1px solid #d7a08f;
            background: #fff1ea;
            color: #7c2d12;
        }

        .banner-info {
            border: 1px solid #b2c4d4;
            background: #f2f7fb;
            color: #1d4d6e;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.15fr 1fr;
            gap: 1rem;
        }

        .workspace-layout {
            display: grid;
            grid-template-columns: 0.95fr 1.35fr 0.95fr;
            gap: 1rem;
            align-items: start;
        }

        .workspace-layout-2col {
            grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.9fr);
        }

        .single-panel-layout {
            display: grid;
            gap: 1rem;
        }

        .stack {
            display: grid;
            gap: 1rem;
        }

        .panel {
            padding: 1.25rem;
        }

        .list {
            list-style: none;
            padding: 0;
            margin: 1rem 0 0;
            display: grid;
            gap: 0.75rem;
        }

        .list li {
            border-top: 1px solid var(--line);
            padding-top: 0.75rem;
        }

        .list li:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .card-title {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            font-weight: 700;
        }

        .actions,
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        label {
            display: grid;
            gap: 0.25rem;
            font-size: 0.95rem;
        }

        input,
        select,
        button {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 0.55rem 0.75rem;
            font: inherit;
            background: #fff;
        }

        button {
            background: var(--accent);
            color: #fff9f4;
            cursor: pointer;
        }

        .secondary {
            background: #fff;
            color: var(--ink);
        }

        .button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 0.55rem 0.75rem;
            font: inherit;
            text-decoration: none;
        }

        .button-link-secondary {
            background: #fff;
            color: var(--ink);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: start;
        }

        .tabbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .tablink {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.55rem 0.9rem;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 250, 242, 0.88);
            color: var(--muted);
            text-decoration: none;
            box-shadow: 0 8px 18px rgba(31, 41, 51, 0.05);
        }

        .tablink.is-active {
            color: #fff9f4;
            background: var(--accent);
            border-color: var(--accent);
        }

        .workspace-list {
            display: grid;
            gap: 0.85rem;
            margin-top: 1rem;
        }

        .workspace-row {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 0.9rem;
            background: rgba(255, 255, 255, 0.65);
        }

        .workspace-row.is-selected {
            border-color: var(--accent);
            box-shadow: inset 0 0 0 1px rgba(162, 62, 42, 0.18);
        }

        .workspace-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.75rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            border: 1px solid var(--line);
            color: var(--muted);
            background: #fff;
            font-size: 0.85rem;
        }

        .badge-enabled {
            color: #0f5132;
            border-color: #9cc5af;
            background: #edf9f1;
        }

        .badge-disabled {
            color: #7c2d12;
            border-color: #d7a08f;
            background: #fff1ea;
        }

        .badge-candidate {
            color: #7a4b00;
            border-color: #d9c07b;
            background: #fff8e6;
        }

        .toggle-list {
            display: grid;
            gap: 0.5rem;
            margin-top: 0.9rem;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .checkbox input {
            width: auto;
            margin: 0;
        }

        .empty {
            margin-top: 1rem;
            color: var(--muted);
        }

        @media (max-width: 840px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .workspace-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        {% if banner_message %}
        <div class="banner banner-{{ banner_tone }}" role="alert">{{ banner_message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
