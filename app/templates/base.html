<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Email Hoover{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f1e8;
            --panel: #fffaf2;
            --ink: #1f2933;
            --muted: #52606d;
            --accent: #a23e2a;
            --line: #d9cbb8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background: linear-gradient(180deg, #efe3d2 0%, var(--bg) 28%, #f9f6ef 100%);
            color: var(--ink);
        }

        a, button {
            color: inherit;
        }

        .shell {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1rem 3rem;
        }

        .hero,
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 12px 32px rgba(31, 41, 51, 0.08);
        }

        .hero {
            display: grid;
            gap: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .hero h1,
        .panel h2 {
            margin: 0;
        }

        .hero p,
        .muted {
            color: var(--muted);
        }

        .banner {
            margin-bottom: 1rem;
            padding: 0.9rem 1rem;
            border: 1px solid #d7a08f;
            border-radius: 12px;
            background: #fff1ea;
            color: #7c2d12;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.15fr 1fr;
            gap: 1rem;
        }

        .stack {
            display: grid;
            gap: 1rem;
        }

        .panel {
            padding: 1.25rem;
        }

        .list {
            list-style: none;
            padding: 0;
            margin: 1rem 0 0;
            display: grid;
            gap: 0.75rem;
        }

        .list li {
            border-top: 1px solid var(--line);
            padding-top: 0.75rem;
        }

        .list li:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .card-title {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            font-weight: 700;
        }

        .actions,
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        label {
            display: grid;
            gap: 0.25rem;
            font-size: 0.95rem;
        }

        input,
        select,
        button {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 0.55rem 0.75rem;
            font: inherit;
            background: #fff;
        }

        button {
            background: var(--accent);
            color: #fff9f4;
            cursor: pointer;
        }

        .secondary {
            background: #fff;
            color: var(--ink);
        }

        .empty {
            margin-top: 1rem;
            color: var(--muted);
        }

        @media (max-width: 840px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        {% if error_message %}
        <div class="banner" role="alert">{{ error_message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
