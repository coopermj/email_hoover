<section class="panel">
    <h2>Recent Cleanup Activity</h2>
    {% if recent_activity %}
    <ul class="list">
        {% for item in recent_activity %}
        <li>
            <div class="card-title">
                <span>{{ item.heading }}</span>
                <span class="muted">{{ item.status }}</span>
            </div>
            <p class="muted">{{ item.detail }}</p>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="empty">No cleanup activity recorded yet.</p>
    {% endif %}
</section>
